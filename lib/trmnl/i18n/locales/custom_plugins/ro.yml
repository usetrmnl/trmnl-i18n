    public_recipe_stats:
      __translator_note: Strings for recipe https://trmnl.com/recipes/170970. You do not need to translate strings ending with `__translator_note`. The following strings are using the Unicode MessageFormat 2 syntax. See https://messageformat.unicode.org/ for details. See https://www.unicode.org/cldr/charts/48/supplemental/language_plural_rules.html for pluralization rules of your language.
      connections: ".input {$value :number} .match $value zero {{Nicio conexiune}} one {{{$value :number} conexiune}} * {{{$value :number} conexiuni}}"
      connections__translator_note: Title for the number of connections to a public recipe. {$value :number} is the number of connections.
      forks: ".input {$value :number} .match $value zero {{Niciun fork}} one {{{$value :number} fork}} * {{{$value :number} fork-uri}}"
      installs: ".input {$value :number} .match $value zero {{Nicio instalare}} one {{{$value :number} instalare}} * {{{$value :number} instalări}}"
      and_more: și {$value :number} mai mult
      and_more__translator_note: Used when some recipe stats are not shown on screen. {$value :number} is the number of additional stats that are not shown. You may pluralization rules if necessary in your language.
      error_keyword_title: '"{$keyword}" nu a corespuns niciunui rezultat.'
      error_keyword_subtitle: Încearcă să cauți altceva.
      error_new_title: Nu a fost găsit niciun rețetar nou.
      error_new_subtitle: Asta nu ar trebui să se întâmple.
      error_self_title: Nu ai publicat niciun rețetar.
      error_self_subtitle: Află cum să publici primul tău rețetar la https://help.trmnl.com/en/articles/9510536-private-plugins
      error_author_id_title: 'Utilizatorul #{$authorId} nu a publicat niciun rețetar.'
      error_author_id_subtitle: Nu a fost găsit niciun rețetar asociat cu acest ID.
      error_recipe_ids_title: Nu a fost găsit niciun ID de rețetar.
      error_recipe_ids_subtitle: Adaugă un ID de rețetar pentru a începe.
    horizontal_world_clock:
