    public_recipe_stats:
      __translator_note: Strings for recipe https://trmnl.com/recipes/170970. You do not need to translate strings ending with `__translator_note`. The following strings are using the Unicode MessageFormat 2 syntax. See https://messageformat.unicode.org/ for details. See https://www.unicode.org/cldr/charts/48/supplemental/language_plural_rules.html for pluralization rules of your language.
      connections: ".input {$value :number} .match $value zero {{No connection}} one {{{$value :number} connection}} * {{{$value :number} connections}}"
      connections__translator_note: Title for the number of connections to a public recipe. {$value :number} is the number of connections.
      forks: ".input {$value :number} .match $value zero {{No fork}} one {{{$value :number} fork}} * {{{$value :number} forks}}"
      installs: ".input {$value :number} .match $value zero {{No install}} one {{{$value :number} install}} * {{{$value :number} installs}}"
      and_more: and {$value :number} more
      and_more__translator_note: Used when some recipe stats are not shown on screen. {$value :number} is the number of additional stats that are not shown. You may pluralization rules if necessary in your language.
      error_keyword_title: "“{$keyword}” did not match any result."
      error_keyword_subtitle: Try searching for something else.
